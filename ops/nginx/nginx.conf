worker_processes auto;

events {
  worker_connections 1024;
}

http {
  proxy_cache_path /var/cache/nginx keys_zone=api_cache:20m levels=1:2 inactive=10m max_size=200m;

  upstream lms_backend {
    least_conn;
    server app:5000 max_fails=3 fail_timeout=15s;
    server app-2:5000 max_fails=3 fail_timeout=15s;
    server app-3:5000 max_fails=3 fail_timeout=15s;
    keepalive 128;
  }

  server {
    listen 80;
    server_name _;

    location / {
      proxy_pass http://lms_backend;
      proxy_http_version 1.1;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Trace-Id $http_x_trace_id;
      proxy_set_header Connection "";
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_buffering on;
      proxy_buffers 16 16k;
    }
  }
}
