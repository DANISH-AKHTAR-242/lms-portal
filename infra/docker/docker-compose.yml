services:
  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: lms-app
    env_file:
      - ../../.env
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  app-2:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: lms-app-2
    env_file:
      - ../../.env
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  app-3:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: lms-app-3
    env_file:
      - ../../.env
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    container_name: lms-web
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: lms-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: lms-nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - app-2
      - app-3
      - web
    restart: unless-stopped

volumes:
  mongo_data:
