worker_processes auto;

events {
  worker_connections 1024;
}

http {
  upstream lms_backend {
    least_conn;
    server app:5000 max_fails=3 fail_timeout=15s;
    server app-2:5000 max_fails=3 fail_timeout=15s;
    server app-3:5000 max_fails=3 fail_timeout=15s;
    keepalive 128;
  }

  upstream lms_web {
    least_conn;
    server web:80;
    keepalive 64;
  }

  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass http://lms_backend;
      proxy_http_version 1.1;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Trace-Id $http_x_trace_id;
      proxy_set_header Connection "";
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    location /health {
      proxy_pass http://lms_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /metrics {
      proxy_pass http://lms_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      proxy_pass http://lms_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
